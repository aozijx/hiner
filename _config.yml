# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Hinerの小窝
subtitle: ''
description: 'Blog'
keywords: 'Blog, 生活, 资源, 分享'
author: Hiner
language: zh-CN
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: http://aozijx.github.io/hiner
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source # 源文件目录，存放博客文章和资源文件。
public_dir: public # 生成的静态文件目录，存放 Hexo 生成的静态文件。
tag_dir: tags # 标签目录，存放标签页面。
archive_dir: archives # 归档目录，存放归档页面。
category_dir: categories # 分类目录，存放分类页面。
code_dir: downloads/code # 代码目录，存放代码文件。
i18n_dir: :lang # 多语言目录，存放多语言文件。
skip_render: # 不需要渲染的文件或目录，支持 glob 模式。

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase # 将标题转换为标题大小写
external_link: # 文章中外部链接的设置
  enable: true # Open external links in new tab # 在新标签页中打开外部链接
  field: site # Apply to the whole site # 应用于整个站点
  exclude: ''
filename_case: 0 # 0: no change, 1: lower case, 2: upper case # 0: 不改变，1: 小写，2: 大写
render_drafts: false # Render drafts # 渲染草稿
post_asset_folder: false # Enable post asset folder # 启用文章资源文件夹
relative_link: false # Enable relative link # 启用相对链接
future: true # Allow publishing future posts # 允许发布未来的文章
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false # 自动检测代码语言
  tab_replace: '' # 替换 Tab 键
  wrap: false # 是否换行
  hljs: false # 是否使用 highlight.js 语法高亮
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Markdown-it config
markdown:
  render:
    html: true # 不转义 HTML 内容 # 转义 HTML 内容，使标签作为文本输出
    xhtmlOut: false # 必须使用完全的 XHTML 代码，换行必须为 <br/> # 不必必使用完全的 XHTML 代码，换行可以为 <br>
    breaks: true # 每次会车换行相当于一个 <br/> 标签 # Pa每次会车换行会被忽略
    linkify: true # 类似链接的文本，作为链接输出 # 类似链接的文本，依然作为文本输出
    typographer: true # 替换常见的排版元素 # 不替换常见的排版元素
    quotes: '“”‘’' # 'single'、"double" 变成 ‘single’、“double” # 'single'、"double" 变成 “single”、«single»
  plugins:
    - markdown-it-abbr
    - markdown-it-footnote
    - markdown-it-ins
    - markdown-it-sub
    - markdown-it-sup
    - '@renbaoshuo/markdown-it-katex'
  anchors:
    level: 2 # 生成 Heading ID 的标题等级
    collisionSuffix: 'v' # Heading ID 重复时，数字的后缀
    permalink: true # 则创建一个锚标记，除标题外还有一个固定链接
    permalinkClass: header-anchor # 用于固定链接锚标记的样式
    permalinkSymbol: ¶ # 用于固定链接标记的符号

katex:
  # 开启全局渲染（无需在每篇文章中声明）
  global: false  # 建议设为 false，按需在文章头启用
  # 排除不需要渲染的元素（可选）
  exclude: 
    - blockquote
    - code

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: '' # 首页路径（默认是空字符串）
  per_page: 10 # 每页显示的文章数量
  order_by: -date # 排序方式（按日期倒序）

# Category & Tag
default_category: uncategorized
category_map: # 分类映射
  # 生活: life
  # 旅行: travel
  # 学习: study
  # 技术: technology
  # 随笔: essay
  # 其他: other
tag_map: # 标签映射


# RSS 订阅配置
feed:
  type: atom       # 类型：atom/rss2（默认atom，兼容性更好）
  path: atom.xml    # 生成的 RSS 文件路径（默认atom.xml）
  limit: 20         # 最多包含的文章数量（默认全部）
  hub:              # 可选，用于 WebSub/PubSubHubbub 通知的Hub地址
  content: false    # 是否包含文章全文（默认仅摘要）
  content_limit:    # 摘要长度（默认不限制）
  order_by: -date   # 排序方式（按日期倒序）
  icon: icon.png    # 可选，订阅图标
  autodiscovery: true  # 自动在页面<head>中添加RSS链接

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true # Add generator meta tag # 添加生成器 meta 标签

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime' # 'mtime' (modified time), 'date' (published date), 'empty' (no updated date) # 更新日期选项

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10 # 每页显示的文章数量
pagination_dir: page # 分页目录

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: solitude

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/aozijx/hiner  # 静态页面仓库的 URL
  branch: main          # 部署分支（GitHub Pages 默认为 main 或 gh-pages）
  # message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"  # 可选：提交信息 
