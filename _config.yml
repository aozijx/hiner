# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Hinerの小窝
subtitle: ''
description: 'Blog'
keywords:
author: Hiner
language: zh-CN
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: http://aozijx.github.io/hiner
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: false
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Markdown-it config
markdown:
  render:
    html: true # 不转义 HTML 内容 # 转义 HTML 内容，使标签作为文本输出
    xhtmlOut: false # 必须使用完全的 XHTML 代码，换行必须为 <br/> # 不必必使用完全的 XHTML 代码，换行可以为 <br>
    breaks: true # 每次会车换行相当于一个 <br/> 标签 # Pa每次会车换行会被忽略
    linkify: true # 类似链接的文本，作为链接输出 # 类似链接的文本，依然作为文本输出
    typographer: true # 替换常见的排版元素 # 不替换常见的排版元素
    quotes: '“”‘’' # 'single'、"double" 变成 ‘single’、“double” # 'single'、"double" 变成 “single”、«single»
  plugins:
    - markdown-it-abbr
    - markdown-it-footnote
    - markdown-it-ins
    - markdown-it-sub
    - markdown-it-sup
  anchors:
    level: 2 # 生成 Heading ID 的标题等级
    collisionSuffix: 'v' # Heading ID 重复时，数字的后缀
    permalink: true # 则创建一个锚标记，除标题外还有一个固定链接
    permalinkClass: header-anchor # 用于固定链接锚标记的样式
    permalinkSymbol: ¶ # 用于固定链接标记的符号

katex:
  # 开启全局渲染（无需在每篇文章中声明）
  global: false  # 建议设为 false，按需在文章头启用
  # 排除不需要渲染的元素（可选）
  exclude: 
    - blockquote
    - code

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: solitude

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: https://github.com/aozijx/hiner  # 静态页面仓库的 URL
  branch: main          # 部署分支（GitHub Pages 默认为 main 或 gh-pages）
  # message: "Site updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"  # 可选：提交信息 
